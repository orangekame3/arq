<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>arq</title>
  <link rel="icon" type="image/png" href="/static/logo.png">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="sidebar-overlay"></div>
    <aside id="sidebar">
      <div class="sidebar-header">arq</div>
      <ul id="categories"></ul>
    </aside>
    <section id="paper-list">
      <header id="list-header">
        <div id="list-title-row">
          <button id="btn-mobile-menu" title="Categories">&#9776;</button>
          <span id="list-title">arq</span>
        </div>
        <input id="search" type="text" placeholder="Search" autocomplete="off">
        <div id="list-meta">
          <span id="paper-count"></span>
          <select id="sort-select">
            <option value="date-desc">Newest</option>
            <option value="date-asc">Oldest</option>
            <option value="title">Title</option>
            <option value="added">Recently Added</option>
          </select>
        </div>
      </header>
      <ul id="papers"></ul>
    </section>
    <main id="detail">
      <div id="detail-empty">Select a paper to read</div>
      <div id="detail-content" class="hidden">
        <div id="detail-toolbar">
          <div id="toolbar-panels">
            <button id="btn-back" title="Back to list" class="hidden">&#8592;</button>
            <button id="btn-toggle-sidebar" title="Toggle sidebar">&#9776;</button>
            <button id="btn-toggle-list" title="Toggle paper list">&#9881;</button>
          </div>
          <div id="lang-toggle" class="hidden">
            <button id="btn-en" class="active">Original</button>
            <button id="btn-ja">Japanese</button>
          </div>
          <span id="toolbar-id"></span>
          <span id="update-badge" class="hidden" title="New version available"></span>
          <div id="toolbar-actions">
            <button id="btn-arxiv" title="Open on arxiv.org">arxiv</button>
            <button id="btn-download" title="Download PDF (d)">download</button>
            <button id="btn-toggle-meta" title="Toggle metadata panel (i)">info</button>
            <button id="btn-toggle-note" title="Toggle note panel (n)">note</button>
            <button id="btn-toggle-theme" title="Toggle dark/light mode (t)">theme</button>
          </div>
          <div id="fab-overlay"></div>
          <button id="fab-trigger">+</button>
        </div>
        <div id="detail-body">
          <div id="pdf-loading">Loading PDF…</div>
          <div id="pdf-mobile-prompt" class="hidden">
            <a id="pdf-open-link" href="#" target="_blank">Open PDF</a>
          </div>
          <iframe id="pdf-frame"></iframe>
          <aside id="metadata-panel" class="collapsed">
            <div id="meta-tabs">
              <button id="meta-tab-info" class="meta-tab active">Info</button>
              <button id="meta-tab-note" class="meta-tab">Note</button>
            </div>
            <div id="meta-info-content">
              <div id="meta-header"></div>
              <div id="meta-abstract"></div>
              <div id="meta-summary"></div>
            </div>
            <div id="meta-note-content" class="hidden">
              <div id="meta-notes"></div>
            </div>
          </aside>
        </div>
      </div>
    </main>
  </div>
  <script src="/static/app.js" type="module"></script>
</body>
</html>
